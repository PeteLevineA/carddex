[build]
  publish = "dist"
  command = "npm run build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "public, max-age=600"

[[headers]]
  for = "/cards/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
